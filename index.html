<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战 - Tank Battle</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel-bg: #16213e;
            --text: #e0e0e0;
            --accent: #e94560;
            --gold: #f0c040;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .game-wrapper {
            display: flex;
            gap: 20px;
            align-items: stretch;
        }

        .side-panel {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            color: var(--text);
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 180px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .side-panel h2 {
            text-align: center;
            font-size: 1.4em;
            color: var(--accent);
            letter-spacing: 2px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1em;
        }

        .stat-label {
            color: #aaa;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.3em;
            color: var(--gold);
        }

        .lives-display {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .life-icon {
            width: 20px;
            height: 20px;
            background: #4caf50;
            border-radius: 3px;
            border: 2px solid #388e3c;
        }

        canvas {
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(233, 68, 96, 0.3);
            image-rendering: pixelated;
            background: #0a0a0a;
        }

        .controls-info {
            font-size: 0.85em;
            color: #888;
            line-height: 1.6;
        }

        .controls-info kbd {
            background: #333;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.9em;
            color: #ddd;
        }

        .game-over-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .game-over-overlay.active {
            display: flex;
        }

        .game-over-box {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            color: var(--text);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        }

        .game-over-box h1 {
            font-size: 2.5em;
            margin-bottom: 16px;
            color: var(--accent);
        }

        .game-over-box p {
            font-size: 1.2em;
            margin-bottom: 24px;
        }

        .game-over-box button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 1px;
        }

        .game-over-box button:hover {
            background: #ff5a7a;
            transform: scale(1.05);
        }

        .game-over-box button:active {
            transform: scale(0.97);
        }

        .level-indicator {
            text-align: center;
            font-size: 0.9em;
            color: #aaa;
            padding: 6px 0;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- 左侧信息面板 -->
        <div class="side-panel">
            <h2>🎮 坦克大战</h2>
            <div class="stat-item">
                <span class="stat-label">🏆 得分</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">🎯 关卡</span>
                <span class="stat-value" id="levelDisplay">1</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">💀 剩余敌人</span>
                <span class="stat-value" id="enemiesLeft">20</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">❤️ 生命</span>
                <div class="lives-display" id="livesDisplay"></div>
            </div>
            <div class="controls-info">
                <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 移动<br>
                <kbd>空格</kbd> 射击<br>
                <kbd>P</kbd> 暂停
            </div>
        </div>

        <!-- 游戏画布 -->
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- 游戏结束遮罩 -->
    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-box">
            <h1 id="gameOverTitle">游戏结束</h1>
            <p id="gameOverMsg">最终得分: <strong>0</strong></p>
            <button id="restartBtn">🔄 重新开始</button>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 常量配置 ====================
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            // 游戏区域: 26列 x 26行 (经典坦克大战是13x13的大格子，我们做26x26精细版)
            const COLS = 26;
            const ROWS = 26;
            const CELL_SIZE = 24;
            const GAME_WIDTH = COLS * CELL_SIZE; // 624
            const GAME_HEIGHT = ROWS * CELL_SIZE; // 624
            const PANEL_WIDTH = 160;

            canvas.width = GAME_WIDTH + PANEL_WIDTH;
            canvas.height = GAME_HEIGHT;

            // 方向
            const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };
            const DIR_VECTORS = [
                { x: 0, y: -1 }, // UP
                { x: 1, y: 0 }, // RIGHT
                { x: 0, y: 1 }, // DOWN
                { x: -1, y: 0 }, // LEFT
            ];

            // 地图元素
            const EMPTY = 0;
            const BRICK = 1;
            const STEEL = 2;
            const WATER = 3;
            const TREE = 4;
            const BASE = 5;

            // ==================== 地图数据 ====================
            function createLevelMap(level) {
                // 创建空地图
                const map = Array.from({ length: ROWS }, () => Array(COLS).fill(EMPTY));

                // 放置基地（底部中央）
                map[ROWS - 2][Math.floor(COLS / 2) - 1] = BASE;
                map[ROWS - 2][Math.floor(COLS / 2)] = BASE;
                map[ROWS - 1][Math.floor(COLS / 2) - 1] = BASE;
                map[ROWS - 1][Math.floor(COLS / 2)] = BASE;

                // 基地周围的砖墙保护
                for (let r = ROWS - 3; r <= ROWS; r++) {
                    for (let c = Math.floor(COLS / 2) - 2; c <= Math.floor(COLS / 2) + 1; c++) {
                        if (map[r] && map[r][c] === EMPTY) {
                            if (r === ROWS - 3 || c === Math.floor(COLS / 2) - 2 || c === Math.floor(COLS / 2) + 1) {
                                map[r][c] = BRICK;
                            }
                        }
                    }
                }

                // 根据关卡生成不同的地图
                const layouts = getLevelLayouts();
                const layout = layouts[(level - 1) % layouts.length];

                // 应用布局（对称地）
                for (const [row, col, type] of layout) {
                    if (row >= 0 && row < ROWS && col >= 0 && col < COLS / 2) {
                        // 左侧
                        if (map[row][col] === EMPTY) map[row][col] = type;
                        // 右侧镜像
                        const mirrorCol = COLS - 1 - col;
                        if (map[row][mirrorCol] === EMPTY) map[row][mirrorCol] = type;
                    }
                }

                // 确保出生点（玩家和敌人）是空的
                // 玩家出生点：底部左侧
                clearSpawnArea(map, ROWS - 2, 3);
                // 玩家出生点：底部右侧
                clearSpawnArea(map, ROWS - 2, COLS - 4);
                // 敌人出生点：顶部
                clearSpawnArea(map, 0, Math.floor(COLS / 2));
                clearSpawnArea(map, 1, Math.floor(COLS / 2));

                return map;
            }

            function clearSpawnArea(map, row, col) {
                for (let r = row - 1; r <= row + 1; r++) {
                    for (let c = col - 1; c <= col + 1; c++) {
                        if (r >= 0 && r < ROWS && c >= 0 && c < COLS && map[r][c] !== BASE) {
                            map[r][c] = EMPTY;
                        }
                    }
                }
            }

            function getLevelLayouts() {
                return [
                    // 关卡1：简单布局
                    [
                        [2, 0, BRICK],
                        [2, 1, BRICK],
                        [2, 2, BRICK],
                        [4, 0, BRICK],
                        [4, 1, BRICK],
                        [6, 0, BRICK],
                        [6, 1, BRICK],
                        [8, 0, BRICK],
                        [8, 1, BRICK],
                        [10, 0, STEEL],
                        [12, 0, BRICK],
                        [12, 1, BRICK],
                        [14, 4, BRICK],
                        [14, 5, BRICK],
                        [16, 0, BRICK],
                        [16, 1, BRICK],
                        [18, 0, BRICK],
                        [18, 1, BRICK],
                        [20, 4, BRICK],
                        [20, 5, BRICK],
                        [22, 0, BRICK],
                        [22, 1, BRICK],
                        [6, 4, TREE],
                        [6, 5, TREE],
                        [8, 4, TREE],
                        [10, 4, TREE],
                        [10, 5, TREE],
                    ],
                    // 关卡2：中等布局
                    [
                        [2, 0, BRICK],
                        [2, 1, BRICK],
                        [2, 2, BRICK],
                        [2, 3, BRICK],
                        [3, 5, STEEL],
                        [4, 0, BRICK],
                        [4, 1, BRICK],
                        [5, 2, BRICK],
                        [5, 3, BRICK],
                        [6, 5, BRICK],
                        [7, 0, BRICK],
                        [7, 1, BRICK],
                        [8, 3, STEEL],
                        [9, 5, BRICK],
                        [10, 0, BRICK],
                        [10, 1, BRICK],
                        [11, 2, BRICK],
                        [11, 3, BRICK],
                        [12, 5, STEEL],
                        [14, 0, BRICK],
                        [14, 1, BRICK],
                        [15, 3, BRICK],
                        [16, 5, BRICK],
                        [18, 0, BRICK],
                        [18, 1, BRICK],
                        [20, 2, BRICK],
                        [20, 3, BRICK],
                        [22, 0, STEEL],
                        [3, 0, TREE],
                        [3, 1, TREE],
                        [9, 3, TREE],
                        [9, 4, TREE],
                        [15, 0, TREE],
                        [15, 1, TREE],
                        [21, 3, TREE],
                        [21, 4, TREE],
                    ],
                    // 关卡3：困难布局
                    [
                        [1, 0, STEEL],
                        [2, 2, BRICK],
                        [2, 3, BRICK],
                        [3, 5, BRICK],
                        [4, 0, STEEL],
                        [4, 1, STEEL],
                        [5, 3, BRICK],
                        [5, 4, BRICK],
                        [6, 0, BRICK],
                        [6, 1, BRICK],
                        [7, 5, STEEL],
                        [8, 2, BRICK],
                        [8, 3, BRICK],
                        [9, 0, BRICK],
                        [9, 1, BRICK],
                        [10, 4, STEEL],
                        [11, 2, BRICK],
                        [11, 3, BRICK],
                        [12, 0, BRICK],
                        [12, 1, BRICK],
                        [13, 5, BRICK],
                        [14, 3, STEEL],
                        [15, 0, BRICK],
                        [15, 1, BRICK],
                        [16, 5, BRICK],
                        [17, 2, BRICK],
                        [18, 0, STEEL],
                        [19, 4, BRICK],
                        [20, 1, BRICK],
                        [20, 2, BRICK],
                        [22, 0, STEEL],
                        [22, 1, STEEL],
                        [2, 5, TREE],
                        [8, 5, TREE],
                        [14, 0, TREE],
                        [14, 1, TREE],
                        [20, 4, TREE],
                    ],
                ];
            }

            // ==================== 游戏状态 ====================
            const MAX_LIVES = 5;
            const ENEMIES_PER_LEVEL = 20;
            const MAX_ENEMIES_ON_SCREEN = 4;
            const MAX_ACTIVE_BULLETS = 2;

            let gameState = {
                level: 1,
                score: 0,
                lives: 3,
                enemiesRemaining: ENEMIES_PER_LEVEL,
                enemiesKilled: 0,
                paused: false,
                gameOver: false,
                gameWon: false,
            };

            let map = [];
            let player = null;
            let enemies = [];
            let bullets = [];
            let particles = [];
            let powerUps = [];
            let keys = {};
            let spawnTimer = 0;
            let spawnInterval = 120; // 帧
            let freezeTimer = 0;
            let shakeTimer = 0;
            let shakeIntensity = 0;

            // ==================== 游戏对象 ====================
            class Tank {
                constructor(x, y, dir, type) {
                    this.x = x; // 像素坐标（左上角）
                    this.y = y;
                    this.dir = dir;
                    this.type = type; // 'player' | 'enemy_basic' | 'enemy_fast' | 'enemy_power' | 'enemy_armor'
                    this.width = CELL_SIZE * 2 - 4;
                    this.height = CELL_SIZE * 2 - 4;
                    this.speed = this.getBaseSpeed();
                    this.bullets = [];
                    this.active = true;
                    this.spawning = true;
                    this.spawnTimer = 45; // 出生保护时间
                    this.flashTimer = 0;
                    this.hp = this.getMaxHp();
                    this.aiDirChangeCooldown = 0;
                    this.aiShootCooldown = 0;
                    this.powerLevel = 0; // 0=普通, 1=快速, 2=双发, 3=穿甲
                }

                getBaseSpeed() {
                    switch (this.type) {
                        case 'player':
                            return 2.5;
                        case 'enemy_basic':
                            return 1.0;
                        case 'enemy_fast':
                            return 2.0;
                        case 'enemy_power':
                            return 1.3;
                        case 'enemy_armor':
                            return 0.8;
                        default:
                            return 1.5;
                    }
                }

                getMaxHp() {
                    switch (this.type) {
                        case 'player':
                            return 1;
                        case 'enemy_armor':
                            return 4;
                        default:
                            return 1;
                    }
                }

                getScore() {
                    switch (this.type) {
                        case 'enemy_basic':
                            return 100;
                        case 'enemy_fast':
                            return 200;
                        case 'enemy_power':
                            return 300;
                        case 'enemy_armor':
                            return 400;
                        default:
                            return 100;
                    }
                }

                getColor() {
                    if (this.spawning && Math.floor(this.spawnTimer / 6) % 2 === 0) return '#ffffff';

                    switch (this.type) {
                        case 'player':
                            if (this.powerLevel >= 3) return '#ffeb3b'; // 金色
                            if (this.powerLevel >= 2) return '#8bc34a'; // 浅绿
                            if (this.powerLevel >= 1) return '#66bb6a'; // 中绿
                            return '#4caf50'; // 绿色
                        case 'enemy_basic':
                            return '#f44336'; // 红色
                        case 'enemy_fast':
                            return '#ff9800'; // 橙色
                        case 'enemy_power':
                            return '#9c27b0'; // 紫色
                        case 'enemy_armor':
                            return '#607d8b'; // 灰蓝
                        default:
                            return '#999';
                    }
                }

                getBounds() {
                    return {
                        x: this.x,
                        y: this.y,
                        w: this.width,
                        h: this.height,
                    };
                }

                collidesWith(otherBounds) {
                    return (
                        this.x < otherBounds.x + otherBounds.w &&
                        this.x + this.width > otherBounds.x &&
                        this.y < otherBounds.y + otherBounds.h &&
                        this.y + this.height > otherBounds.y
                    );
                }

                tryMove(dx, dy) {
                    const newX = this.x + dx;
                    const newY = this.y + dy;

                    // 边界检测
                    if (newX < 0 || newX + this.width > GAME_WIDTH ||
                        newY < 0 || newY + this.height > GAME_HEIGHT) {
                        return false;
                    }

                    // 地图碰撞检测
                    const cells = this.getOccupiedCells(newX, newY);
                    for (const [col, row] of cells) {
                        if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return false;
                        const cell = map[row][col];
                        if (cell === BRICK || cell === STEEL || cell === WATER || cell === BASE) {
                            return false;
                        }
                    }

                    // 与其他坦克碰撞（除了自己）
                    const newBounds = { x: newX, y: newY, w: this.width, h: this.height };
                    const allTanks = this.type === 'player' ? enemies : [player, ...enemies.filter(e => e !== this &&
                        e.active)];
                    for (const tank of allTanks) {
                        if (tank && tank.active && tank !== this && this.collidesWithGeneric(newBounds, tank
                            .getBounds())) {
                            return false;
                        }
                    }

                    this.x = newX;
                    this.y = newY;
                    return true;
                }

                getOccupiedCells(x, y) {
                    const cells = [];
                    const margin = 2;
                    const left = x + margin;
                    const right = x + this.width - margin;
                    const top = y + margin;
                    const bottom = y + this.height - margin;

                    const col1 = Math.floor(left / CELL_SIZE);
                    const col2 = Math.floor(right / CELL_SIZE);
                    const row1 = Math.floor(top / CELL_SIZE);
                    const row2 = Math.floor(bottom / CELL_SIZE);

                    for (let r = row1; r <= row2; r++) {
                        for (let c = col1; c <= col2; c++) {
                            cells.push([c, r]);
                        }
                    }
                    return cells;
                }

                collidesWithGeneric(a, b) {
                    return (
                        a.x < b.x + b.w &&
                        a.x + a.w > b.x &&
                        a.y < b.y + b.h &&
                        a.y + a.h > b.y
                    );
                }

                shoot() {
                    if (!this.active || this.spawning) return null;

                    // 检查活跃子弹数
                    const myBullets = bullets.filter(b => b.owner === this);
                    if (myBullets.length >= MAX_ACTIVE_BULLETS) return null;

                    // 子弹从炮管方向射出
                    const cx = this.x + this.width / 2;
                    const cy = this.y + this.height / 2;

                    let bx, by;
                    const offset = this.width / 2;

                    switch (this.dir) {
                        case DIR.UP:
                            bx = cx - 2;
                            by = this.y - 4;
                            break;
                        case DIR.DOWN:
                            bx = cx - 2;
                            by = this.y + this.height;
                            break;
                        case DIR.LEFT:
                            bx = this.x - 4;
                            by = cy - 2;
                            break;
                        case DIR.RIGHT:
                            bx = this.x + this.width;
                            by = cy - 2;
                            break;
                    }

                    const bullet = new Bullet(bx, by, this.dir, this);
                    bullets.push(bullet);

                    // 双发：2级及以上从侧面多射一发
                    if (this.powerLevel >= 2) {
                        let bx2, by2;
                        const sideOffset = 8;
                        if (this.dir === DIR.UP || this.dir === DIR.DOWN) {
                            bx2 = bx + (Math.random() > 0.5 ? sideOffset : -sideOffset);
                            by2 = by;
                        } else {
                            bx2 = bx;
                            by2 = by + (Math.random() > 0.5 ? sideOffset : -sideOffset);
                        }
                        bullets.push(new Bullet(bx2, by2, this.dir, this));
                    }

                    return bullet;
                }
            }

            class Bullet {
                constructor(x, y, dir, owner) {
                    this.x = x;
                    this.y = y;
                    this.dir = dir;
                    this.owner = owner;
                    this.speed = owner.type === 'player' ? 4.5 : 3.0;
                    this.width = 4;
                    this.height = 4;
                    this.active = true;
                    this.piercing = owner.powerLevel >= 3; // 3级穿甲
                }

                getBounds() {
                    return { x: this.x, y: this.y, w: this.width, h: this.height };
                }

                update() {
                    const vec = DIR_VECTORS[this.dir];
                    this.x += vec.x * this.speed;
                    this.y += vec.y * this.speed;

                    // 边界检测
                    if (this.x < -10 || this.x > GAME_WIDTH + 10 ||
                        this.y < -10 || this.y > GAME_HEIGHT + 10) {
                        this.active = false;
                        return;
                    }

                    // 地图碰撞
                    const col = Math.floor((this.x + this.width / 2) / CELL_SIZE);
                    const row = Math.floor((this.y + this.height / 2) / CELL_SIZE);
                    if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
                        const cell = map[row][col];
                        if (cell === BRICK) {
                            destroyBrick(col, row);
                            if (!this.piercing) this.active = false;
                        } else if (cell === STEEL) {
                            // 3级以上可以摧毁钢铁
                            if (this.piercing && this.owner.type === 'player') {
                                map[row][col] = EMPTY;
                                spawnParticles(col * CELL_SIZE + CELL_SIZE / 2, row * CELL_SIZE + CELL_SIZE / 2, '#8888ff',
                                    8);
                            }
                            this.active = false;
                        } else if (cell === BASE) {
                            destroyBase();
                            this.active = false;
                        }
                    }

                    // 与其他子弹碰撞
                    for (const other of bullets) {
                        if (other !== this && other.active &&
                            this.owner.type !== other.owner.type &&
                            this.collidesWith(other.getBounds())) {
                            this.active = false;
                            other.active = false;
                            spawnParticles((this.x + other.x) / 2, (this.y + other.y) / 2, '#ffff00', 5);
                            return;
                        }
                    }
                }

                collidesWith(bounds) {
                    return (
                        this.x < bounds.x + bounds.w &&
                        this.x + this.width > bounds.x &&
                        this.y < bounds.y + bounds.h &&
                        this.y + this.height > bounds.y
                    );
                }
            }

            // ==================== 粒子效果 ====================
            class Particle {
                constructor(x, y, color, vx, vy, life) {
                    this.x = x;
                    this.y = y;
                    this.color = color;
                    this.vx = vx;
                    this.vy = vy;
                    this.life = life;
                    this.maxLife = life;
                    this.size = 2 + Math.random() * 3;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.life--;
                }

                get alpha() {
                    return this.life / this.maxLife;
                }

                get alive() {
                    return this.life > 0;
                }
            }

            function spawnParticles(x, y, color, count) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1 + Math.random() * 4;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    const life = 15 + Math.random() * 20;
                    particles.push(new Particle(x, y, color, vx, vy, life));
                }
            }

            // ==================== 道具 ====================
            class PowerUp {
                constructor(x, y, type) {
                    this.x = x;
                    this.y = y;
                    this.type = type; // 'star', 'tank', 'bomb', 'clock', 'shield'
                    this.width = CELL_SIZE;
                    this.height = CELL_SIZE;
                    this.life = 600; // 10秒
                    this.flashTimer = 0;
                }

                getColor() {
                    switch (this.type) {
                        case 'star':
                            return '#ffeb3b'; // 黄色-升级
                        case 'tank':
                            return '#4caf50'; // 绿色-加命
                        case 'bomb':
                            return '#f44336'; // 红色-清屏
                        case 'clock':
                            return '#2196f3'; // 蓝色-冻结
                        case 'shield':
                            return '#9e9e9e'; // 灰色-护盾
                        default:
                            return '#fff';
                    }
                }

                getSymbol() {
                    switch (this.type) {
                        case 'star':
                            return '⭐';
                        case 'tank':
                            return '🛡️';
                        case 'bomb':
                            return '💣';
                        case 'clock':
                            return '⏰';
                        case 'shield':
                            return '🛡️';
                        default:
                            return '?';
                    }
                }
            }

            // ==================== 地图操作 ====================
            function destroyBrick(col, row) {
                if (map[row][col] === BRICK) {
                    map[row][col] = EMPTY;
                    spawnParticles(col * CELL_SIZE + CELL_SIZE / 2, row * CELL_SIZE + CELL_SIZE / 2, '#c8956c', 4);
                }
            }

            function destroyBase() {
                // 基地被摧毁，游戏结束
                for (let r = ROWS - 2; r <= ROWS - 1; r++) {
                    for (let c = Math.floor(COLS / 2) - 1; c <= Math.floor(COLS / 2); c++) {
                        if (map[r][c] === BASE) {
                            map[r][c] = EMPTY;
                            spawnParticles(c * CELL_SIZE + CELL_SIZE / 2, r * CELL_SIZE + CELL_SIZE / 2, '#ff4444', 12);
                        }
                    }
                }
                endGame(false);
            }

            // ==================== 游戏流程 ====================
            function initLevel() {
                map = createLevelMap(gameState.level);
                bullets = [];
                particles = [];
                powerUps = [];
                enemies = [];
                spawnTimer = 0;
                freezeTimer = 0;
                shakeTimer = 0;
                shakeIntensity = 0;

                // 重置玩家位置
                const playerSpawnX = 3 * CELL_SIZE;
                const playerSpawnY = (ROWS - 2) * CELL_SIZE;
                if (player) {
                    player.x = playerSpawnX;
                    player.y = playerSpawnY;
                    player.dir = DIR.UP;
                    player.active = true;
                    player.spawning = true;
                    player.spawnTimer = 45;
                    player.hp = player.getMaxHp();
                    // 保留powerLevel
                } else {
                    player = new Tank(playerSpawnX, playerSpawnY, DIR.UP, 'player');
                }

                updateUI();
            }

            function spawnEnemy() {
                if (gameState.enemiesRemaining <= 0) return null;
                if (enemies.filter(e => e.active).length >= MAX_ENEMIES_ON_SCREEN) return null;

                const spawnCols = [0, Math.floor(COLS / 2), COLS - 3];
                const spawnCol = spawnCols[Math.floor(Math.random() * spawnCols.length)];
                const spawnX = spawnCol * CELL_SIZE;
                const spawnY = 0;

                // 检查出生点是否被占用
                const newBounds = { x: spawnX, y: spawnY, w: CELL_SIZE * 2 - 4, h: CELL_SIZE * 2 - 4 };
                const allTanks = [player, ...enemies];
                for (const tank of allTanks) {
                    if (tank && tank.active && tank.collidesWithGeneric(newBounds, tank.getBounds())) {
                        return null; // 被占用，稍后再试
                    }
                }

                // 根据关卡选择敌人类型
                const types = ['enemy_basic', 'enemy_basic', 'enemy_basic'];
                if (gameState.level >= 2) types.push('enemy_fast', 'enemy_fast');
                if (gameState.level >= 3) types.push('enemy_power', 'enemy_power');
                if (gameState.level >= 4) types.push('enemy_armor');

                const enemyType = types[Math.floor(Math.random() * types.length)];
                const enemy = new Tank(spawnX, spawnY, DIR.DOWN, enemyType);
                enemies.push(enemy);
                gameState.enemiesRemaining--;
                return enemy;
            }

            function playerShoot() {
                if (!player || !player.active || player.spawning) return;
                if (freezeTimer > 0) return;
                player.shoot();
            }

            function destroyTank(tank, byPlayer) {
                if (!tank.active) return;

                tank.hp--;
                spawnParticles(tank.x + tank.width / 2, tank.y + tank.height / 2, tank.getColor(), 10);

                if (tank.hp <= 0) {
                    tank.active = false;
                    if (byPlayer) {
                        gameState.score += tank.getScore();
                        gameState.enemiesKilled++;

                        // 击杀敌人可能掉落道具
                        if (Math.random() < 0.15) {
                            const pTypes = ['star', 'tank', 'bomb', 'clock', 'shield'];
                            const pType = pTypes[Math.floor(Math.random() * pTypes.length)];
                            powerUps.push(new PowerUp(
                                tank.x + tank.width / 2 - CELL_SIZE / 2,
                                tank.y + tank.height / 2 - CELL_SIZE / 2,
                                pType
                            ));
                        }
                    }
                    shakeTimer = 8;
                    shakeIntensity = 3;
                }
            }

            function applyPowerUp(powerUp) {
                switch (powerUp.type) {
                    case 'star':
                        // 升级火力
                        if (player.powerLevel < 3) player.powerLevel++;
                        gameState.score += 50;
                        break;
                    case 'tank':
                        // 加一条命
                        if (gameState.lives < MAX_LIVES) gameState.lives++;
                        gameState.score += 100;
                        break;
                    case 'bomb':
                        // 消灭所有敌人
                        for (const enemy of enemies) {
                            if (enemy.active) {
                                enemy.hp = 0;
                                enemy.active = false;
                                gameState.score += enemy.getScore();
                                gameState.enemiesKilled++;
                                spawnParticles(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, '#ff4444', 15);
                            }
                        }
                        shakeTimer = 15;
                        shakeIntensity = 8;
                        break;
                    case 'clock':
                        // 冻结敌人10秒
                        freezeTimer = 600;
                        gameState.score += 30;
                        break;
                    case 'shield':
                        // 临时无敌（出生保护延长）
                        player.spawning = true;
                        player.spawnTimer = 180;
                        gameState.score += 80;
                        break;
                }
                powerUp.life = 0; // 标记为消耗
            }

            function endGame(won) {
                gameState.gameOver = true;
                gameState.gameWon = won;

                const overlay = document.getElementById('gameOverOverlay');
                const title = document.getElementById('gameOverTitle');
                const msg = document.getElementById('gameOverMsg');

                overlay.classList.add('active');
                title.textContent = won ? '🎉 胜利！' : '💥 游戏结束';
                title.style.color = won ? '#4caf50' : '#e94560';
                msg.innerHTML = `最终得分: <strong>${gameState.score}</strong><br>到达关卡: <strong>${gameState.level}</strong>`;
            }

            function restartGame() {
                gameState = {
                    level: 1,
                    score: 0,
                    lives: 3,
                    enemiesRemaining: ENEMIES_PER_LEVEL,
                    enemiesKilled: 0,
                    paused: false,
                    gameOver: false,
                    gameWon: false,
                };
                player = null;
                enemies = [];
                bullets = [];
                particles = [];
                powerUps = [];
                spawnTimer = 0;
                freezeTimer = 0;
                shakeTimer = 0;
                shakeIntensity = 0;

                document.getElementById('gameOverOverlay').classList.remove('active');
                initLevel();
            }

            function nextLevel() {
                gameState.level++;
                gameState.enemiesRemaining = ENEMIES_PER_LEVEL;
                gameState.enemiesKilled = 0;
                gameState.lives = Math.min(gameState.lives + 1, MAX_LIVES);
                initLevel();
            }

            function playerDied() {
                gameState.lives--;
                spawnParticles(player.x + player.width / 2, player.y + player.height / 2, '#4caf50', 20);
                shakeTimer = 12;
                shakeIntensity = 6;

                if (gameState.lives <= 0) {
                    endGame(false);
                } else {
                    // 重生
                    player.x = 3 * CELL_SIZE;
                    player.y = (ROWS - 2) * CELL_SIZE;
                    player.dir = DIR.UP;
                    player.active = true;
                    player.spawning = true;
                    player.spawnTimer = 60;
                    player.hp = player.getMaxHp();
                }
                updateUI();
            }

            function updateUI() {
                document.getElementById('score').textContent = gameState.score;
                document.getElementById('levelDisplay').textContent = gameState.level;
                document.getElementById('enemiesLeft').textContent =
                    gameState.enemiesRemaining + enemies.filter(e => e.active).length;

                const livesDisplay = document.getElementById('livesDisplay');
                livesDisplay.innerHTML = '';
                for (let i = 0; i < gameState.lives; i++) {
                    const icon = document.createElement('div');
                    icon.className = 'life-icon';
                    livesDisplay.appendChild(icon);
                }
            }

            // ==================== AI逻辑 ====================
            function updateEnemyAI(enemy) {
                if (!enemy.active || enemy.spawning) return;
                if (freezeTimer > 0) return;

                // AI方向切换冷却
                if (enemy.aiDirChangeCooldown > 0) enemy.aiDirChangeCooldown--;

                // AI射击冷却
                if (enemy.aiShootCooldown > 0) {
                    enemy.aiShootCooldown--;
                } else {
                    // 射击逻辑：玩家在视野内时较高概率射击
                    const dx = player.x - enemy.x;
                    const dy = player.y - enemy.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    let shootProb = 0.01; // 基础随机射击概率

                    if (dist < GAME_WIDTH * 0.6) {
                        // 检查是否大致对准玩家
                        const aligned = (
                            (enemy.dir === DIR.UP && dy < 0 && Math.abs(dx) < CELL_SIZE * 2) ||
                            (enemy.dir === DIR.DOWN && dy > 0 && Math.abs(dx) < CELL_SIZE * 2) ||
                            (enemy.dir === DIR.LEFT && dx < 0 && Math.abs(dy) < CELL_SIZE * 2) ||
                            (enemy.dir === DIR.RIGHT && dx > 0 && Math.abs(dy) < CELL_SIZE * 2)
                        );
                        if (aligned) shootProb = 0.08;
                    }

                    if (Math.random() < shootProb) {
                        enemy.shoot();
                        enemy.aiShootCooldown = 30 + Math.floor(Math.random() * 40);
                    }
                }

                // 移动AI：随机改变方向
                if (enemy.aiDirChangeCooldown <= 0) {
                    const rand = Math.random();

                    // 有一定概率追踪玩家
                    if (rand < 0.3 && player.active) {
                        const dx = player.x - enemy.x;
                        const dy = player.y - enemy.y;
                        if (Math.abs(dx) > Math.abs(dy)) {
                            enemy.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
                        } else {
                            enemy.dir = dy > 0 ? DIR.DOWN : DIR.UP;
                        }
                    } else {
                        enemy.dir = Math.floor(Math.random() * 4);
                    }

                    enemy.aiDirChangeCooldown = 20 + Math.floor(Math.random() * 80);
                }

                // 移动
                const vec = DIR_VECTORS[enemy.dir];
                const moved = enemy.tryMove(vec.x * enemy.speed, vec.y * enemy.speed);

                // 如果被挡住，换方向
                if (!moved) {
                    enemy.dir = Math.floor(Math.random() * 4);
                    enemy.aiDirChangeCooldown = 10;
                }
            }

            // ==================== 渲染 ====================
            function drawCell(col, row, type) {
                const x = col * CELL_SIZE;
                const y = row * CELL_SIZE;

                switch (type) {
                    case BRICK:
                        ctx.fillStyle = '#c8956c';
                        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                        // 砖块纹理
                        ctx.fillStyle = '#b07a4e';
                        ctx.fillRect(x + 1, y + 1, CELL_SIZE / 2 - 1, CELL_SIZE / 2 - 1);
                        ctx.fillRect(x + CELL_SIZE / 2, y + CELL_SIZE / 2, CELL_SIZE / 2 - 1, CELL_SIZE / 2 - 1);
                        ctx.fillStyle = '#d4a574';
                        ctx.fillRect(x + CELL_SIZE / 2, y + 1, CELL_SIZE / 2 - 1, CELL_SIZE / 2 - 1);
                        ctx.fillRect(x + 1, y + CELL_SIZE / 2, CELL_SIZE / 2 - 1, CELL_SIZE / 2 - 1);
                        break;
                    case STEEL:
                        ctx.fillStyle = '#b0bec5';
                        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                        ctx.fillStyle = '#90a4ae';
                        ctx.fillRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                        ctx.fillStyle = '#cfd8dc';
                        ctx.fillRect(x + 4, y + 4, CELL_SIZE / 2 - 2, CELL_SIZE / 2 - 2);
                        ctx.fillRect(x + CELL_SIZE / 2, y + CELL_SIZE / 2, CELL_SIZE / 2 - 2, CELL_SIZE / 2 - 2);
                        break;
                    case WATER:
                        ctx.fillStyle = '#1565c0';
                        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                        ctx.fillStyle = '#1e88e5';
                        const waveOffset = Math.sin(Date.now() / 300 + col + row) * 3;
                        ctx.fillRect(x + 2, y + 4 + waveOffset, CELL_SIZE - 4, 3);
                        ctx.fillRect(x + 2, y + 12 + waveOffset, CELL_SIZE - 4, 3);
                        break;
                    case TREE:
                        ctx.fillStyle = '#2e7d32';
                        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                        ctx.fillStyle = '#388e3c';
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE / 2, y + CELL_SIZE / 2, CELL_SIZE / 2 - 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#43a047';
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE / 3, y + CELL_SIZE / 3, CELL_SIZE / 3, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    case BASE:
                        // 鹰形标志
                        ctx.fillStyle = '#333';
                        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                        ctx.fillStyle = '#ffd700';
                        ctx.beginPath();
                        ctx.moveTo(x + CELL_SIZE / 2, y + 4);
                        ctx.lineTo(x + CELL_SIZE - 4, y + CELL_SIZE - 4);
                        ctx.lineTo(x + CELL_SIZE / 2, y + CELL_SIZE - 8);
                        ctx.lineTo(x + 4, y + CELL_SIZE - 4);
                        ctx.closePath();
                        ctx.fill();
                        break;
                }
            }

            function drawTank(tank) {
                if (!tank.active) return;

                ctx.save();
                const cx = tank.x + tank.width / 2;
                const cy = tank.y + tank.height / 2;

                // 出生闪烁效果
                if (tank.spawning) {
                    if (Math.floor(tank.spawnTimer / 6) % 2 === 0) {
                        ctx.globalAlpha = 0.5;
                    }
                }

                ctx.translate(cx, cy);
                const angle = tank.dir * Math.PI / 2;
                ctx.rotate(angle);

                const hw = tank.width / 2;
                const hh = tank.height / 2;

                // 履带
                ctx.fillStyle = '#333';
                ctx.fillRect(-hw + 2, -hh, hw - 4, tank.height); // 左履带
                ctx.fillRect(2, -hh, hw - 4, tank.height); // 右履带

                // 履带纹理
                ctx.fillStyle = '#444';
                for (let i = -hh + 3; i < hh; i += 6) {
                    ctx.fillRect(-hw + 2, i, 2, 3);
                    ctx.fillRect(2, i, 2, 3);
                    ctx.fillRect(hw - 4, i, 2, 3);
                    ctx.fillRect(-4, i, 2, 3);
                }

                // 车身
                ctx.fillStyle = tank.getColor();
                ctx.fillRect(-hw + 5, -hh + 2, tank.width - 10, tank.height - 4);

                // 车身细节
                const darkerColor = shadeColor(tank.getColor(), -20);
                ctx.fillStyle = darkerColor;
                ctx.fillRect(-hw + 5, -hh + 2, tank.width - 10, 4);
                ctx.fillRect(-hw + 5, hh - 6, tank.width - 10, 4);

                // 炮塔（圆形）
                ctx.fillStyle = shadeColor(tank.getColor(), -10);
                ctx.beginPath();
                ctx.arc(0, 0, hw * 0.4, 0, Math.PI * 2);
                ctx.fill();

                // 炮管
                ctx.fillStyle = shadeColor(tank.getColor(), -30);
                ctx.fillRect(-2, -hh - 4, 4, hh + 2);

                // 炮管高光
                ctx.fillStyle = shadeColor(tank.getColor(), 10);
                ctx.fillRect(-1, -hh - 4, 2, hh + 2);

                ctx.restore();
            }

            function shadeColor(color, percent) {
                const num = parseInt(color.replace('#', ''), 16);
                const amt = Math.round(2.55 * percent);
                const R = Math.min(255, Math.max(0, (num >> 16) + amt));
                const G = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF00) + amt));
                const B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
                return `rgb(${R},${G},${B})`;
            }

            function drawBullet(bullet) {
                if (!bullet.active) return;
                ctx.fillStyle = bullet.owner.type === 'player' ? '#ffeb3b' : '#ff5252';
                ctx.shadowColor = bullet.owner.type === 'player' ? '#ffeb3b' : '#ff5252';
                ctx.shadowBlur = 6;
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
                ctx.shadowBlur = 0;

                // 尾迹
                const vec = DIR_VECTORS[bullet.dir];
                const tailX = bullet.x - vec.x * 4;
                const tailY = bullet.y - vec.y * 4;
                ctx.fillStyle = bullet.owner.type === 'player' ?
                    'rgba(255, 235, 59, 0.5)' : 'rgba(255, 82, 82, 0.5)';
                ctx.fillRect(tailX, tailY, bullet.width, bullet.height);
            }

            function drawPowerUp(pu) {
                const alpha = pu.life < 120 && Math.floor(pu.life / 10) % 2 === 0 ? 0.4 : 1;
                ctx.save();
                ctx.globalAlpha = alpha;

                // 背景
                ctx.fillStyle = pu.getColor();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(pu.x + 2, pu.y + 2, pu.width - 4, pu.height - 4, 6);
                ctx.fill();
                ctx.stroke();

                // 图标
                ctx.font = '16px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#000';
                ctx.fillText(pu.getSymbol(), pu.x + pu.width / 2, pu.y + pu.height / 2);

                ctx.restore();
            }

            function drawSidePanel() {
                const panelX = GAME_WIDTH;
                ctx.fillStyle = '#16213e';
                ctx.fillRect(panelX, 0, PANEL_WIDTH, GAME_HEIGHT);

                // 标题区域
                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 16px "Microsoft YaHei", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('敌军', panelX + PANEL_WIDTH / 2, 30);

                // 剩余敌人图标
                const totalEnemies = gameState.enemiesRemaining + enemies.filter(e => e.active).length;
                const iconSize = 16;
                const iconsPerRow = 2;
                const startX = panelX + 20;
                const startY = 50;

                for (let i = 0; i < Math.min(totalEnemies, 20); i++) {
                    const row = Math.floor(i / iconsPerRow);
                    const col = i % iconsPerRow;
                    const ix = startX + col * (iconSize + 12);
                    const iy = startY + row * (iconSize + 8);

                    ctx.fillStyle = '#f44336';
                    ctx.fillRect(ix, iy, iconSize, iconSize);
                    ctx.fillStyle = '#d32f2f';
                    ctx.fillRect(ix + 2, iy + 2, iconSize - 4, iconSize - 4);
                    // 小炮管
                    ctx.fillStyle = '#b71c1c';
                    ctx.fillRect(ix + iconSize / 2 - 1, iy - 3, 2, 5);
                }

                // 图例
                const legendY = GAME_HEIGHT - 200;
                ctx.fillStyle = '#e0e0e0';
                ctx.font = '13px "Microsoft YaHei", sans-serif';
                ctx.textAlign = 'left';

                const legends = [
                    { color: '#f44336', text: '基本坦克 100分' },
                    { color: '#ff9800', text: '快速坦克 200分' },
                    { color: '#9c27b0', text: '强力坦克 300分' },
                    { color: '#607d8b', text: '装甲坦克 400分' },
                ];

                legends.forEach((l, i) => {
                    const ly = legendY + i * 28;
                    ctx.fillStyle = l.color;
                    ctx.fillRect(panelX + 20, ly, 14, 14);
                    ctx.fillStyle = '#ccc';
                    ctx.fillText(l.text, panelX + 42, ly + 11);
                });

                // 道具图例
                ctx.fillStyle = '#e0e0e0';
                ctx.fillText('道具', panelX + 20, legendY + 130);

                const powerLegend = [
                    { color: '#ffeb3b', text: '⭐ 升级火力' },
                    { color: '#4caf50', text: '🛡️ 额外生命' },
                    { color: '#f44336', text: '💣 全屏清除' },
                    { color: '#2196f3', text: '⏰ 冻结敌人' },
                    { color: '#9e9e9e', text: '🛡️ 临时无敌' },
                ];

                powerLegend.forEach((l, i) => {
                    const ly = legendY + 150 + i * 22;
                    ctx.fillStyle = '#aaa';
                    ctx.fillText(l.text, panelX + 20, ly);
                });
            }

            function render() {
                // 清除画布
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 应用屏幕震动
                let shakeX = 0;
                let shakeY = 0;
                if (shakeTimer > 0) {
                    shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
                    shakeY = (Math.random() - 0.5) * shakeIntensity * 2;
                }

                ctx.save();
                ctx.translate(shakeX, shakeY);

                // 绘制地图
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (map[r][c] !== EMPTY) {
                            drawCell(c, r, map[r][c]);
                        }
                    }
                }

                // 绘制道具
                for (const pu of powerUps) {
                    if (pu.life > 0) drawPowerUp(pu);
                }

                // 绘制子弹
                for (const bullet of bullets) {
                    if (bullet.active) drawBullet(bullet);
                }

                // 绘制坦克
                for (const enemy of enemies) {
                    if (enemy.active) drawTank(enemy);
                }
                if (player && player.active) {
                    drawTank(player);
                }

                // 绘制粒子
                for (const particle of particles) {
                    if (particle.alive) {
                        ctx.fillStyle = particle.color;
                        ctx.globalAlpha = particle.alpha;
                        ctx.fillRect(particle.x, particle.y, particle.size, particle.size);
                    }
                }
                ctx.globalAlpha = 1;

                // 冻结效果
                if (freezeTimer > 0) {
                    ctx.fillStyle = 'rgba(33, 150, 243, 0.08)';
                    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                }

                ctx.restore();

                // 绘制侧边栏
                drawSidePanel();

                // 暂停覆盖
                if (gameState.paused && !gameState.gameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 36px "Microsoft YaHei", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('⏸ 暂停中', GAME_WIDTH / 2, GAME_HEIGHT / 2);
                    ctx.font = '18px "Microsoft YaHei", sans-serif';
                    ctx.fillText('按 P 继续', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 40);
                }
            }

            // ==================== 游戏循环 ====================
            function update() {
                if (gameState.gameOver || gameState.paused) return;

                // 更新震动
                if (shakeTimer > 0) shakeTimer--;
                if (freezeTimer > 0) freezeTimer--;

                // 更新玩家
                if (player && player.active) {
                    if (player.spawning) {
                        player.spawnTimer--;
                        if (player.spawnTimer <= 0) {
                            player.spawning = false;
                        }
                    }

                    if (!player.spawning) {
                        // 移动
                        let moved = false;
                        const speed = player.speed;
                        if (keys['ArrowUp'] || keys['w'] || keys['W']) {
                            player.dir = DIR.UP;
                            moved = player.tryMove(0, -speed);
                        } else if (keys['ArrowDown'] || keys['s'] || keys['S']) {
                            player.dir = DIR.DOWN;
                            moved = player.tryMove(0, speed);
                        } else if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                            player.dir = DIR.LEFT;
                            moved = player.tryMove(-speed, 0);
                        } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                            player.dir = DIR.RIGHT;
                            moved = player.tryMove(speed, 0);
                        }

                        // 自动射击（按住空格持续发射）
                        if (keys[' '] || keys['Space']) {
                            playerShoot();
                        }
                    }

                    // 检测玩家吃到道具
                    for (const pu of powerUps) {
                        if (pu.life <= 0) continue;
                        const pb = player.getBounds();
                        const pub = { x: pu.x, y: pu.y, w: pu.width, h: pu.height };
                        if (player.collidesWithGeneric(pb, pub)) {
                            applyPowerUp(pu);
                        }
                    }
                }

                // 更新敌人
                for (const enemy of enemies) {
                    if (!enemy.active) continue;
                    if (enemy.spawning) {
                        enemy.spawnTimer--;
                        if (enemy.spawnTimer <= 0) enemy.spawning = false;
                        continue;
                    }
                    if (freezeTimer <= 0) {
                        updateEnemyAI(enemy);
                    }
                }

                // 更新子弹
                for (const bullet of bullets) {
                    if (!bullet.active) continue;
                    bullet.update();

                    // 检查子弹是否击中坦克
                    if (bullet.active && bullet.owner.type === 'player') {
                        for (const enemy of enemies) {
                            if (!enemy.active || enemy.spawning) continue;
                            if (bullet.collidesWith(enemy.getBounds())) {
                                destroyTank(enemy, true);
                                if (!bullet.piercing) bullet.active = false;
                                break;
                            }
                        }
                    } else if (bullet.active && bullet.owner.type !== 'player') {
                        if (player && player.active && !player.spawning && bullet.collidesWith(player.getBounds())) {
                            bullet.active = false;
                            playerDied();
                        }
                    }
                }

                // 清理
                bullets = bullets.filter(b => b.active);
                enemies = enemies.filter(e => e.active);
                particles = particles.filter(p => p.alive);
                powerUps = powerUps.filter(pu => pu.life > 0);

                // 更新粒子
                for (const p of particles) p.update();

                // 更新道具生命周期
                for (const pu of powerUps) pu.life--;

                // 刷新敌人
                if (spawnTimer <= 0) {
                    if (gameState.enemiesRemaining > 0 || enemies.filter(e => e.active).length > 0) {
                        spawnEnemy();
                        spawnTimer = spawnInterval;
                    }
                } else {
                    spawnTimer--;
                }

                // 检查是否所有敌人都被消灭
                if (gameState.enemiesRemaining <= 0 && enemies.filter(e => e.active).length === 0) {
                    // 进入下一关
                    setTimeout(() => nextLevel(), 1500);
                }

                updateUI();
            }

            function gameLoop() {
                update();
                render();
                requestAnimationFrame(gameLoop);
            }

            // ==================== 输入处理 ====================
            window.addEventListener('keydown', (e) => {
                keys[e.key] = true;

                if (e.key === 'p' || e.key === 'P') {
                    if (!gameState.gameOver) {
                        gameState.paused = !gameState.paused;
                    }
                }

                // 防止方向键滚动页面
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                    e.preventDefault();
                }
            });

            window.addEventListener('keyup', (e) => {
                keys[e.key] = false;
            });

            document.getElementById('restartBtn').addEventListener('click', () => {
                restartGame();
            });

            // ==================== 启动游戏 ====================
            function startGame() {
                player = new Tank(3 * CELL_SIZE, (ROWS - 2) * CELL_SIZE, DIR.UP, 'player');
                initLevel();
                gameLoop();
            }

            startGame();
            console.log('🎮 坦克大战已就绪！');
            console.log('  ↑↓←→ 移动  |  空格 射击  |  P 暂停');
            console.log('  保护底部基地，消灭所有敌人！');
        })();
    </script>
</body>
</html>
